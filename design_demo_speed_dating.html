<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Speed Dating</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f43f5e 0%, #fb923c 100%);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-main: #ffffff;
            --text-sub: rgba(255, 255, 255, 0.8);
            --card-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            --accent-yes: #10b981;
            --accent-no: #ef4444;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            color: var(--text-main);
        }

        /* Ambient Background Particles */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.5;
            animation: float 10s infinite ease-in-out;
        }

        .orb-1 {
            width: 350px;
            height: 350px;
            background: #ff00cc;
            top: -50px;
            left: -50px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 450px;
            height: 450px;
            background: #fcd34d;
            bottom: -100px;
            right: -100px;
            animation-delay: -5s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0);
            }

            50% {
                transform: translate(30px, -30px);
            }
        }

        .container {
            position: relative;
            z-index: 10;
            width: 360px;
            height: 700px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            margin-bottom: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 900;
            margin: 0;
            letter-spacing: -1px;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .header p {
            color: var(--text-sub);
            font-size: 15px;
            margin: 5px 0 0;
            font-weight: 400;
        }

        .card-stack {
            position: relative;
            width: 100%;
            height: 480px;
            perspective: 1000px;
        }

        .card {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            box-shadow: var(--card-shadow);
            padding: 30px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.4s ease;
            cursor: grab;
            user-select: none;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: #1f2937;
        }

        .card-visual {
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            height: 200px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 70px;
            margin-bottom: 25px;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.05);
        }

        /* Specific gradients for roles */
        .role-ux-research .card-visual {
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
        }

        .role-prompting .card-visual {
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
        }

        .role-analysis .card-visual {
            background: linear-gradient(135deg, #cfd9df 0%, #e2ebf0 100%);
        }

        .role-user-studies .card-visual {
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
        }

        .role-ui-design .card-visual {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
        }

        .role-prototyping .card-visual {
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
        }

        .card-tag {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(10px);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: rgba(0, 0, 0, 0.6);
        }

        .card-content h2 {
            font-size: 26px;
            font-weight: 800;
            margin: 0 0 10px;
            line-height: 1.1;
            color: #111827;
        }

        .card-content p {
            font-size: 16px;
            color: #4b5563;
            line-height: 1.6;
            font-weight: 400;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 30px;
        }

        .btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            font-size: 28px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .btn:hover {
            transform: scale(1.15) translateY(-5px);
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-no {
            color: var(--accent-no);
        }

        .btn-yes {
            color: var(--accent-yes);
        }

        .status-overlay {
            position: absolute;
            top: 40px;
            padding: 8px 16px;
            border: 4px solid;
            font-weight: 900;
            font-size: 32px;
            border-radius: 12px;
            opacity: 0;
            transform: rotate(-15deg) scale(0.8);
            transition: opacity 0.2s;
            text-transform: uppercase;
        }

        .status-like {
            right: 40px;
            color: var(--accent-yes);
            border-color: var(--accent-yes);
            transform: rotate(15deg);
        }

        .status-nope {
            left: 40px;
            color: var(--accent-no);
            border-color: var(--accent-no);
        }

        /* Result Screen */
        #results {
            display: none;
            text-align: center;
            width: 100%;
            height: 100%;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .result-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            max-width: 380px;
        }

        .match-percent {
            font-size: 32px;
            font-weight: 900;
            background: linear-gradient(to right, #ffe600, #ff007b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 10px 0;
            line-height: 1.2;
        }

        /* Navigation Dock */
        .dock {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(15px);
            padding: 8px 15px;
            border-radius: 50px;
            display: flex;
            gap: 5px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            z-index: 100;
        }

        .dock-item {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .dock-item:hover {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            transform: translateY(-2px);
        }

        .dock-item.active {
            background: white;
            color: #f43f5e;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>

<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <!-- Navigation Dock -->
    <div class="dock">
        <a href="index.html" class="dock-item" title="Home">🏠 Home</a>
        <a href="design.html" class="dock-item active" title="Main Design">✨ Design</a>
    </div>

    <div class="container">
        <div class="header">
            <h1>Design Fit</h1>
            <p>Swipe Right if it sparks joy.</p>
        </div>

        <div class="card-stack" id="stack">
            <!-- Cards injected via JS -->
        </div>

        <div class="buttons">
            <button class="btn btn-no" onclick="handleSwipe('left')">✕</button>
            <button class="btn btn-yes" onclick="handleSwipe('right')">♥</button>
        </div>

        <div id="results">
            <div class="result-card">
                <h2 style="margin-top:0">It's a Match!</h2>
                <p>You vibe most with:</p>
                <div class="match-percent">Design Team</div>
                <p>Your interests point toward an exciting role in design.</p>
                <button class="btn"
                    style="width:auto; height: 50px; padding: 0 30px; border-radius: 30px; margin-top: 20px; font-size: 16px; color: white; background: rgba(255,255,255,0.2); font-weight: bold;"
                    onclick="location.reload()">Replay</button>
            </div>
        </div>
    </div>

    <script>
        const tasks = [
            // Prototyping/Idea Incubation Team (4 cards)
            {
                id: 1,
                role: "Prototyping/Idea Incubation",
                title: "AI Prompting",
                desc: "Craft precise prompts to rapidly generate UI components and design variations.",
                icon: "✨",
                class: "role-prompting"
            },
            {
                id: 2,
                role: "Prototyping/Idea Incubation",
                title: "Prototyping",
                desc: "Build interactive, high-fidelity mockups to test user flows and gather actionable feedback.",
                icon: "📱",
                class: "role-prototyping"
            },
            {
                id: 3,
                role: "Prototyping/Idea Incubation",
                title: "UI Design",
                desc: "Create visually stunning and accessible interfaces that delight users at first glance.",
                icon: "🎨",
                class: "role-ui-design"
            },
            {
                id: 4,
                role: "Prototyping/Idea Incubation",
                title: "User Studies",
                desc: "Observe how test users interact with your prototypes to iterate and improve the interface.",
                icon: "👀",
                class: "role-user-studies"
            },

            // AI Design Team (4 cards)
            {
                id: 5,
                role: "AI Design",
                title: "User Interviews",
                desc: "Conduct in-depth interviews to understand behaviors, underlying needs, and pain points.",
                icon: "👥",
                class: "role-user-studies"
            },
            {
                id: 6,
                role: "AI Design",
                title: "Thematic Analysis",
                desc: "Synthesize qualitative data to discover patterns and extract meaningful insights.",
                icon: "📊",
                class: "role-analysis"
            },
            {
                id: 7,
                role: "AI Design",
                title: "UX Research",
                desc: "Explore human-centered problems and frame research questions to guide product strategy.",
                icon: "🔍",
                class: "role-ux-research"
            }
        ];

        // Shuffle tasks randomly
        tasks.sort(() => Math.random() - 0.5);

        let currentIndex = tasks.length - 1;
        const stack = document.getElementById('stack');
        const results = document.getElementById('results');
        const header = document.querySelector('.header');
        const buttons = document.querySelector('.buttons');

        let likes = {
            "AI Design": 0,
            "Prototyping/Idea Incubation": 0
        };

        function init() {
            tasks.forEach((task, index) => {
                const el = document.createElement('div');
                el.className = `card ${task.class || ''}`;
                el.style.zIndex = index;
                // Add slight random rotation for deck effect
                const randomRot = Math.random() * 4 - 2;
                el.style.transform = `rotate(${randomRot}deg)`;

                el.innerHTML = `
                <div class="card-tag">${task.role}</div>
                <div class="card-visual">${task.icon}</div>
                <div class="card-content">
                    <h2>${task.title}</h2>
                    <p>${task.desc}</p>
                </div>
                <div class="status-overlay status-like">YES</div>
                <div class="status-overlay status-nope">NOPE</div>
            `;
                stack.appendChild(el);
            });
        }

        function handleSwipe(direction) {
            if (currentIndex < 0) return;

            const card = stack.children[currentIndex];
            const task = tasks[currentIndex];

            // Visual animation
            const translateX = direction === 'right' ? 400 : -400;
            const rotate = direction === 'right' ? 30 : -30;

            card.style.transition = "transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.6s";
            card.style.transform = `translate(${translateX}px, 0) rotate(${rotate}deg)`;
            card.style.opacity = '0';

            // Show overlay with transition
            const overlayClass = direction === 'right' ? '.status-like' : '.status-nope';
            setTimeout(() => {
                card.querySelector(overlayClass).style.opacity = '1';
            }, 10);

            // Logic
            if (direction === 'right') {
                likes[task.role]++;
            }

            currentIndex--;

            if (currentIndex < 0) {
                setTimeout(showResults, 400);
            }
        }

        function showResults() {
            stack.style.display = 'none';
            buttons.style.display = 'none';
            header.style.display = 'none';
            results.style.display = 'flex';

            // Find max (defaulting to Prototyping/Idea Incubation if tied)
            let maxRole = "Prototyping/Idea Incubation";
            if (likes["AI Design"] > likes["Prototyping/Idea Incubation"]) {
                maxRole = "AI Design";
            }

            // Map match to a vague quality for student display
            const qualityMap = {
                "AI Design": "AI Design Strategist",
                "Prototyping/Idea Incubation": "Prototyping & Incubation Specialist"
            };

            const finalTeamString = maxRole + " Team";

            // Save to LocalStorage
            const currentData = JSON.parse(localStorage.getItem('t4g_design_fit_data') || '{}');
            currentData.speed_dating = {
                top_match: finalTeamString,
                scores: likes,
                timestamp: new Date().toISOString()
            };
            localStorage.setItem('t4g_design_fit_data', JSON.stringify(currentData));

            // Update result text
            const resultCard = document.querySelector('.result-card');
            resultCard.querySelector('.match-percent').innerText = finalTeamString;
            resultCard.querySelector('p:nth-of-type(2)').innerText = `Your profile shows a ${qualityMap[maxRole]} vibe!`;
        }

        init();

    </script>
</body>

</html>
